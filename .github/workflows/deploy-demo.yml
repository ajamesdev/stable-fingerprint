name: Deploy demo

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # base must match the repo name for GitHub Pages project sites
      - run: npx vite build demo --base=/stable-fingerprint/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: demo/dist
      - id: deploy
        uses: actions/deploy-pages@v4
