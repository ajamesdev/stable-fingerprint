<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>fingerprinter - live demo</title>
		<link rel="stylesheet" href="./style.css" />
	</head>
	<body
		class="min-h-screen bg-neutral-50 font-sans text-neutral-900 antialiased dark:bg-[#0e1116] dark:text-neutral-100"
	>
		<main class="mx-auto max-w-3xl px-5 py-12">
			<header>
				<h1 class="font-mono text-3xl font-bold">fingerprinter</h1>
				<p class="mt-2 max-w-prose text-neutral-500 dark:text-neutral-400">
					A stable browser fingerprint, computed on this page - no cookies, no storage.
				</p>
			</header>

			<section
				class="my-8 rounded-2xl border border-neutral-200 bg-white p-6 dark:border-neutral-800 dark:bg-neutral-900"
				id="result"
				aria-busy="true"
			>
				<div class="font-mono text-neutral-500">Collecting signals…</div>
			</section>

			<section class="hidden" id="components">
				<div class="flex items-center justify-between gap-3">
					<h2 class="text-lg font-semibold">
						Signals <span class="font-normal text-neutral-500" id="signal-count"></span>
					</h2>
					<button
						id="copy-json"
						class="cursor-pointer rounded-lg border border-neutral-300 px-3 py-1.5 text-sm hover:border-blue-500 dark:border-neutral-700"
					>
						Copy debug JSON
					</button>
				</div>
				<div class="mt-3 overflow-x-auto">
					<table class="w-full border-collapse text-sm" id="components-table">
						<thead>
							<tr
								class="border-b border-neutral-200 text-left text-xs uppercase tracking-wide text-neutral-500 dark:border-neutral-800"
							>
								<th class="p-3 font-semibold">Signal</th>
								<th class="p-3 font-semibold">Value</th>
								<th class="p-3 text-right font-semibold">ms</th>
							</tr>
						</thead>
						<tbody></tbody>
					</table>
				</div>
			</section>

			<footer class="mt-10 text-sm text-neutral-500 dark:text-neutral-400">
				<span id="footer-version"></span> · non-cryptographic fingerprint, for
				demonstration.
			</footer>
		</main>

		<script type="module" src="./main.ts"></script>
	</body>
</html>
